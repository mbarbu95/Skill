<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PBQ - Security+ Advanced Scenarios Part 2</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f9;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #617087;
      --line: #d5dde8;
      --accent: #0b5cad;
      --accent-soft: #eaf3ff;
      --good: #16834d;
      --bad: #bd3f35;
      --shadow: 0 10px 28px rgba(23, 32, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
      padding: 26px 0 38px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      margin-bottom: 6px;
      font-size: 29px;
      line-height: 1.18;
    }

    p {
      color: var(--muted);
      line-height: 1.5;
    }

    .score {
      min-width: 172px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 12px 14px;
      text-align: right;
      font-weight: 900;
      box-shadow: var(--shadow);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(270px, 0.78fr) minmax(0, 1.65fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 15px;
      box-shadow: var(--shadow);
    }

    .panel h2 {
      margin-bottom: 12px;
      font-size: 18px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tab {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 900;
    }

    .tab.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: #083b73;
    }

    .scenario {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcff;
      padding: 12px;
      margin-bottom: 12px;
    }

    .scenario strong {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
      color: #2b3648;
    }

    .task-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
      margin-bottom: 12px;
    }

    .task-note {
      max-width: 360px;
      color: var(--muted);
      font-size: 14px;
      text-align: right;
    }

    .bank,
    .drop-zone {
      display: grid;
      gap: 9px;
      align-content: start;
    }

    .bank {
      min-height: 220px;
      border: 1px dashed transparent;
      border-radius: 8px;
    }

    .bank.over,
    .drop-zone.over {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 11px 12px;
      cursor: grab;
      user-select: none;
      font-weight: 900;
      line-height: 1.25;
      min-height: 44px;
      display: flex;
      align-items: center;
      transition: border-color 120ms ease, background 120ms ease, transform 120ms ease;
    }

    .item:active {
      cursor: grabbing;
    }

    .item.dragging {
      opacity: 0.55;
      transform: scale(0.98);
    }

    .item.good {
      border-color: var(--good);
      background: #edf8f2;
    }

    .item.bad {
      border-color: var(--bad);
      background: #fff0ef;
    }

    .targets {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .targets.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .targets.four {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .target {
      min-height: 242px;
      border: 2px dashed var(--line);
      border-radius: 8px;
      background: #fbfcff;
      padding: 12px;
      transition: border-color 120ms ease, background 120ms ease;
    }

    .target.correct {
      border-color: var(--good);
      background: #edf8f2;
    }

    .target.wrong {
      border-color: var(--bad);
      background: #fff0ef;
    }

    .target h3 {
      margin: 0 0 12px;
      font-size: 18px;
      line-height: 1.2;
    }

    .drop-zone {
      min-height: 160px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 8px;
    }

    .sequence-target {
      min-height: 500px;
    }

    .sequence-zone {
      min-height: 380px;
      counter-reset: order;
    }

    .sequence-zone .item {
      position: relative;
      padding-left: 46px;
    }

    .sequence-zone .item::before {
      counter-increment: order;
      content: counter(order);
      position: absolute;
      left: 10px;
      top: 50%;
      width: 25px;
      height: 25px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--accent-soft);
      color: #083b73;
      transform: translateY(-50%);
      font-size: 13px;
      font-weight: 900;
    }

    .empty {
      align-self: center;
      color: #8793a8;
      font-size: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 15px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 11px 13px;
      cursor: pointer;
      font-weight: 900;
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }

    .feedback {
      min-height: 24px;
      margin-top: 12px;
      font-weight: 900;
    }

    @media (max-width: 1080px) {
      .targets.four {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 900px) {
      header,
      .layout,
      .task-head {
        grid-template-columns: 1fr;
      }

      .score,
      .task-note {
        text-align: left;
      }

      .targets,
      .targets.three,
      .targets.four {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

      node.className = "item";
      node.draggable = true;
      node.dataset.itemId = item.id;
      if (item.answer) node.dataset.answer = item.answer;
      if (index !== null) node.dataset.order = String(index);
      node.textContent = item.text;
      node.addEventListener("dragstart", () => node.classList.add("dragging"));
      node.addEventListener("dragend", () => {
        node.classList.remove("dragging");
        fillEmptySlots();
      });
      return node;
    }

    function makeEmptyText(text = "Trage itemii aici") {
      const node = document.createElement("span");
      node.className = "empty";
      node.textContent = text;
      return node;
    }

    function prepareDropZone(zone) {
      zone.addEventListener("dragover", (event) => {
        event.preventDefault();
        zone.classList.add("over");
      });

      zone.addEventListener("dragleave", () => {
        zone.classList.remove("over");
      });

      zone.addEventListener("drop", (event) => {
        event.preventDefault();
        zone.classList.remove("over");
        const dragged = currentDragged();
        if (!dragged) return;

        const empty = zone.querySelector(".empty");
        if (empty) empty.remove();

        if (zone.classList.contains("sequence-zone")) {
          const after = getSequenceInsertBefore(zone, event.clientY);
          if (after) {
            zone.insertBefore(dragged, after);
          } else {
            zone.appendChild(dragged);
          }
        } else {
          zone.appendChild(dragged);
        }

        fillEmptySlots();
        clearResults();
      });
    }

    function getSequenceInsertBefore(container, y) {
      const draggable = [...container.querySelectorAll(".item:not(.dragging)")];
      return draggable.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;
        if (offset < 0 && offset > closest.offset) {
          return { offset, element: child };
        }
        return closest;
      }, { offset: Number.NEGATIVE_INFINITY, element: null }).element;
    }

    function renderTabs() {
      tabs.replaceChildren();
      tasks.forEach((task) => {
        const button = document.createElement("button");
        button.className = `tab${task.id === activeTaskId ? " active" : ""}`;
        button.type = "button";
        button.textContent = task.title;
        button.addEventListener("click", () => {
          activeTaskId = task.id;
          render();
        });
        tabs.appendChild(button);
      });
    }

    function render() {
      const task = activeTask();
      renderTabs();
      itemBank.replaceChildren();
      workArea.replaceChildren();
      feedback.textContent = "";
      taskTitle.textContent = task.title;
      taskNote.textContent = task.mode === "sequence" ? "Pune pasii in ordinea corecta." : "Trage fiecare item in categoria corecta.";
      scenarioText.textContent = task.scenario;
      score.textContent = `Scor: 0 / ${task.mode === "sequence" ? task.sequence.length : task.items.length}`;

      if (task.mode === "sequence") {
        renderSequenceTask(task);
      } else {
        renderCategorizeTask(task);
      }

      prepareDropZone(itemBank);
    }

    function renderCategorizeTask(task) {
      shuffle(task.items).forEach((item) => itemBank.appendChild(makeItem(item)));

      const targets = document.createElement("div");
      targets.className = "targets";
      targets.classList.toggle("three", task.categories.length === 3);
      targets.classList.toggle("four", task.categories.length === 4);

      task.categories.forEach((category) => {
        const target = document.createElement("article");
        target.className = "target";
        target.dataset.targetId = category.id;

        const title = document.createElement("h3");
        title.textContent = category.title;

        const zone = document.createElement("div");
        zone.className = "drop-zone";
        zone.appendChild(makeEmptyText("Trage itemii aici"));

        target.append(title, zone);
        targets.appendChild(target);
        prepareDropZone(zone);
      });

      workArea.appendChild(targets);
    }

    function renderSequenceTask(task) {
      shuffle(task.sequence).forEach((item) => {
        const correctIndex = task.sequence.findIndex((entry) => entry.id === item.id);
        itemBank.appendChild(makeItem(item, correctIndex));
      });

      const target = document.createElement("article");
      target.className = "target sequence-target";
      target.dataset.targetId = "sequence";

      const title = document.createElement("h3");
      title.textContent = "Ordinea actiunilor";

      const zone = document.createElement("div");
      zone.className = "drop-zone sequence-zone";
      zone.appendChild(makeEmptyText("Construieste ordinea aici"));

      target.append(title, zone);
      workArea.appendChild(target);
      prepareDropZone(zone);
    }

    function fillEmptySlots() {
      document.querySelectorAll(".bank, .drop-zone").forEach((zone) => {
        if (!zone.querySelector(".item") && !zone.querySelector(".empty")) {
          const text = zone.classList.contains("sequence-zone")
            ? "Construieste ordinea aici"
            : "Trage itemii aici";
          zone.appendChild(makeEmptyText(text));
        }
      });
    }

    function clearResults() {
      document.querySelectorAll(".target").forEach((target) => {
        target.classList.remove("correct", "wrong");
      });
      document.querySelectorAll(".item").forEach((item) => {
        item.classList.remove("good", "bad");
      });
      feedback.textContent = "";
    }

    function resetAnswers() {
      document.querySelectorAll(".drop-zone .item").forEach((item) => itemBank.appendChild(item));
      fillEmptySlots();
      clearResults();
      const task = activeTask();
      score.textContent = `Scor: 0 / ${task.mode === "sequence" ? task.sequence.length : task.items.length}`;
    }

    function checkAnswers() {
      const task = activeTask();
      if (task.mode === "sequence") {
        checkSequence(task);
      } else {
        checkCategorize(task);
      }
    }

    function checkCategorize(task) {
      let correct = 0;

      task.items.forEach((item) => {
        const node = document.querySelector(`[data-item-id="${item.id}"]`);
        const placedTarget = node.closest(".target")?.dataset.targetId;
        const isCorrect = placedTarget === item.answer;
        if (isCorrect) correct += 1;
        node.classList.toggle("good", isCorrect);
        node.classList.toggle("bad", Boolean(placedTarget && !isCorrect));
      });

      document.querySelectorAll(".target").forEach((target) => {
        const placed = [...target.querySelectorAll(".item")];
        const hasItems = placed.length > 0;
        const allCorrect = placed.every((node) => node.dataset.answer === target.dataset.targetId);
        target.classList.toggle("correct", hasItems && allCorrect);
        target.classList.toggle("wrong", hasItems && !allCorrect);
      });

      score.textContent = `Scor: ${correct} / ${task.items.length}`;
      feedback.textContent = correct === task.items.length
        ? "Perfect. Toti itemii sunt plasati corect."
        : `Ai ${correct} raspunsuri corecte din ${task.items.length}.`;
    }

    function checkSequence(task) {
      let correct = 0;
      const zone = document.querySelector(".sequence-zone");
      const placed = [...zone.querySelectorAll(".item")];

      placed.forEach((node, index) => {
        const isCorrect = Number(node.dataset.order) === index;
        if (isCorrect) correct += 1;
        node.classList.toggle("good", isCorrect);
        node.classList.toggle("bad", !isCorrect);
      });

      document.querySelectorAll("#itemBank .item").forEach((node) => {
        node.classList.remove("good");
        node.classList.add("bad");
      });

      const target = document.querySelector(".sequence-target");
      target.classList.toggle("correct", correct === task.sequence.length);
      target.classList.toggle("wrong", correct !== task.sequence.length && placed.length > 0);

      score.textContent = `Scor: ${correct} / ${task.sequence.length}`;
      feedback.textContent = correct === task.sequence.length
        ? "Perfect. Ordinea este corecta."
        : `Ai ${correct} pozitii corecte din ${task.sequence.length}.`;
    }

    checkBtn.addEventListener("click", checkAnswers);
    resetBtn.addEventListener("click", resetAnswers);
    shuffleBtn.addEventListener("click", render);

    render();
  </script>
</body>
</html>
