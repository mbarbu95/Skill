<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PBQ - Porturi si protocoale</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #5c667a;
      --line: #d8deea;
      --good: #168a52;
      --bad: #c33b32;
      --accent: #2563eb;
      --accent-soft: #e8efff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .score {
      min-width: 150px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      text-align: right;
      font-weight: 700;
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 16px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .protocol-list {
      display: grid;
      gap: 10px;
    }

    .protocol {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      cursor: grab;
      user-select: none;
      font-weight: 700;
      transition: border-color 120ms ease, transform 120ms ease, background 120ms ease;
    }

    .protocol:active {
      cursor: grabbing;
    }

    .protocol.dragging {
      opacity: 0.55;
      transform: scale(0.98);
    }

    .targets {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .target {
      min-height: 112px;
      border: 2px dashed var(--line);
      border-radius: 8px;
      background: #fbfcff;
      padding: 12px;
      transition: border-color 120ms ease, background 120ms ease;
    }

    .target.over {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .target.correct {
      border-color: var(--good);
      background: #edf9f3;
    }

    .target.wrong {
      border-color: var(--bad);
      background: #fff0ef;
    }

    .target-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .port {
      font-size: 20px;
      font-weight: 800;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    .drop-slot {
      min-height: 44px;
      display: flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 8px;
    }

    .drop-slot .protocol {
      width: 100%;
      padding: 10px;
      cursor: grab;
    }

    .empty {
      color: #8a94a8;
      font-size: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 11px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }

    .feedback {
      min-height: 24px;
      margin-top: 12px;
      font-weight: 700;
    }

    @media (max-width: 820px) {
      header,
      .workspace {
        grid-template-columns: 1fr;
        display: grid;
      }

      .score {
        text-align: left;
      }

      .targets {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>PBQ: Potriveste porturile cu protocoalele</h1>
        <p>Trage fiecare protocol pe portul corect, apoi apasa Verifica.</p>
      </div>
      <div class="score" id="score">Scor: 0 / 0</div>
    </header>

    <section class="workspace" aria-label="Simulare PBQ">
      <div class="panel">
        <h2>Protocoale</h2>
        <div class="protocol-list" id="protocolList"></div>
      </div>

      <div class="panel">
        <h2>Porturi</h2>
        <div class="targets" id="targets"></div>
        <div class="actions">
          <button class="primary" id="checkBtn" type="button">Verifica</button>
          <button class="secondary" id="resetBtn" type="button">Reseteaza</button>
          <button class="secondary" id="shuffleBtn" type="button">Amesteca</button>
        </div>
        <div class="feedback" id="feedback" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <script>
    const questions = [
      { port: "20/21", answer: "FTP", hint: "Transfer fisiere" },
      { port: "22", answer: "SSH", hint: "Administrare remote securizata" },
      { port: "23", answer: "Telnet", hint: "Administrare remote nesecurizata" },
      { port: "25", answer: "SMTP", hint: "Trimitere email" },
      { port: "53", answer: "DNS", hint: "Rezolvare nume" },
      { port: "67/68", answer: "DHCP", hint: "Alocare automata IP" },
      { port: "80", answer: "HTTP", hint: "Web nesecurizat" },
      { port: "110", answer: "POP3", hint: "Preluare email" },
      { port: "143", answer: "IMAP", hint: "Sincronizare email" },
      { port: "443", answer: "HTTPS", hint: "Web securizat" },
      { port: "3389", answer: "RDP", hint: "Desktop remote Windows" }
    ];

    const protocolList = document.getElementById("protocolList");
    const targets = document.getElementById("targets");
    const score = document.getElementById("score");
    const feedback = document.getElementById("feedback");
    const checkBtn = document.getElementById("checkBtn");
    const resetBtn = document.getElementById("resetBtn");
    const shuffleBtn = document.getElementById("shuffleBtn");

    function shuffle(items) {
      return [...items].sort(() => Math.random() - 0.5);
    }

    function makeProtocol(name) {
      const item = document.createElement("div");
      item.className = "protocol";
      item.draggable = true;
      item.dataset.protocol = name;
      item.textContent = name;
      item.addEventListener("dragstart", () => item.classList.add("dragging"));
      item.addEventListener("dragend", () => item.classList.remove("dragging"));
      return item;
    }

    function makeEmptyText() {
      const span = document.createElement("span");
      span.className = "empty";
      span.textContent = "Plaseaza protocolul aici";
      return span;
    }

    function currentDragged() {
      return document.querySelector(".protocol.dragging");
    }

    function prepareDropZone(zone) {
      zone.addEventListener("dragover", (event) => {
        event.preventDefault();
        zone.classList.add("over");
      });

      zone.addEventListener("dragleave", () => {
        zone.classList.remove("over");
      });

      zone.addEventListener("drop", (event) => {
        event.preventDefault();
        zone.classList.remove("over");
        const dragged = currentDragged();
        if (!dragged) return;

        if (zone.classList.contains("drop-slot")) {
          const existing = zone.querySelector(".protocol");
          if (existing && existing !== dragged) {
            protocolList.appendChild(existing);
          }
          zone.replaceChildren(dragged);
        } else {
          protocolList.appendChild(dragged);
        }

        clearResults();
      });
    }

    function render() {
      protocolList.replaceChildren();
      targets.replaceChildren();
      feedback.textContent = "";
      score.textContent = `Scor: 0 / ${questions.length}`;

      shuffle(questions.map((q) => q.answer)).forEach((name) => {
        protocolList.appendChild(makeProtocol(name));
      });

      questions.forEach((question) => {
        const target = document.createElement("article");
        target.className = "target";
        target.dataset.answer = question.answer;

        const head = document.createElement("div");
        head.className = "target-head";

        const port = document.createElement("div");
        port.className = "port";
        port.textContent = question.port;

        const hint = document.createElement("div");
        hint.className = "hint";
        hint.textContent = question.hint;

        const slot = document.createElement("div");
        slot.className = "drop-slot";
        slot.appendChild(makeEmptyText());

        head.append(port, hint);
        target.append(head, slot);
        targets.appendChild(target);
        prepareDropZone(slot);
      });

      prepareDropZone(protocolList);
    }

    function clearResults() {
      document.querySelectorAll(".target").forEach((target) => {
        target.classList.remove("correct", "wrong");
      });
      feedback.textContent = "";
    }

    function resetAnswers() {
      document.querySelectorAll(".drop-slot .protocol").forEach((item) => {
        protocolList.appendChild(item);
      });
      document.querySelectorAll(".drop-slot").forEach((slot) => {
        if (!slot.querySelector(".protocol")) {
          slot.replaceChildren(makeEmptyText());
        }
      });
      clearResults();
      score.textContent = `Scor: 0 / ${questions.length}`;
    }

    function checkAnswers() {
      let correct = 0;
      document.querySelectorAll(".target").forEach((target) => {
        const selected = target.querySelector(".protocol");
        const isCorrect = selected && selected.dataset.protocol === target.dataset.answer;
        target.classList.toggle("correct", Boolean(isCorrect));
        target.classList.toggle("wrong", Boolean(selected && !isCorrect));
        if (isCorrect) correct += 1;
      });

      score.textContent = `Scor: ${correct} / ${questions.length}`;
      feedback.textContent = correct === questions.length
        ? "Perfect. Toate potrivirile sunt corecte."
        : `Ai ${correct} raspunsuri corecte din ${questions.length}.`;
    }

    checkBtn.addEventListener("click", checkAnswers);
    resetBtn.addEventListener("click", resetAnswers);
    shuffleBtn.addEventListener("click", render);

    render();
  </script>
</body>
</html>
